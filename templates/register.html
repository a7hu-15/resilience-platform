<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — Resilience Platform</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container auth-container">
        <h1>⚡ Resilience Platform</h1>
        <p class="subtitle">Create your account</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="choose a password" required>
            </div>
            <button type="submit" class="run-btn">→ Create Account</button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</body>
</html>
