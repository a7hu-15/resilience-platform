<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resilience Testing Platform</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <nav class="topnav">
        <span class="nav-brand">■ Resilience Platform</span>
        <div class="nav-links">
            <span class="nav-user">■ {{ username }}</span>
            <a href="/history" class="nav-link">History</a>
            <a href="/logout" class="nav-link logout">Logout</a>
        </div>
    </nav>

    <h1>■ Resilience Testing Platform</h1>
    <p class="subtitle">Test any Docker image against chaos experiments</p>

    <form action="/run-test" method="POST">
        <div class="form-group">
            <label for="docker_images">Docker Images</label>
            <textarea id="docker_images" name="docker_images" rows="4"
                placeholder="nginx:latest, redis:alpine, httpd:latest" required></textarea>
            <p class="hint">Enter one or more Docker images separated by commas</p>
        </div>

        <div class="notif-section">
            <p class="notif-title">■ Email Notification <span class="hint-inline">(optional — get alerted when tests finish)</span></p>
            <div class="form-group">
                <label for="notify_email">Email</label>
                <input type="email" id="notify_email" name="notify_email"
                    placeholder="you@gmail.com">
            </div>
        </div>

        <button type="submit" class="run-btn">■ Run Resilience Test</button>
    </form>
</div>
</body>
</html>
