apiVersion: apps/v1
kind: Deployment
metadata:
  name: resilience-platform
  namespace: default
  labels:
    app: resilience-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resilience-platform
  template:
    metadata:
      labels:
        app: resilience-platform
    spec:
      containers:
      - name: resilience-platform
        image: a7hu15/resilience-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        # Database connection should be injected via Secret in a real environment
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: resilience-db-credentials
              key: database-url
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      serviceAccountName: resilience-platform-sa
