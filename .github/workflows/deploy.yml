name: Resilience Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/resilience-platform
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── 1. SECURITY SCAN (filesystem + dependencies) ──────────────────────────
  trivy-fs-scan:
    name: Trivy — filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs                  # scans your source code + requirements.txt
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH        # only fail on serious issues
          exit-code: 1                   # block the pipeline if vulnerabilities found
          ignore-unfixed: true           # skip CVEs with no fix available yet

  # ── 2. BUILD & PUSH DOCKER IMAGE ──────────────────────────────────────────
  build:
    name: Docker build + push
    runs-on: ubuntu-latest
    needs: trivy-fs-scan               # only runs if Trivy FS scan passed
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  # ── 3. SECURITY SCAN (built Docker image) ─────────────────────────────────
  trivy-image-scan:
    name: Trivy — image scan
    runs-on: ubuntu-latest
    needs: build                       # scan the actual built image
    steps:
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif                 # uploads results to GitHub Security tab
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()                   # upload even if scan found issues
        with:
          sarif_file: trivy-results.sarif

  # ── 4. DEPLOY TO AWS EKS ──────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: trivy-image-scan            # only deploy if image scan passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # Update the image tag in your deployment
          kubectl set image deployment/resilience-platform \
            resilience-platform=$IMAGE_NAME:$IMAGE_TAG \
            --namespace default

          # Wait for rollout to complete
          kubectl rollout status deployment/resilience-platform \
            --namespace default \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n default -l app=resilience-platform
          echo "Deployment successful — image: $IMAGE_NAME:$IMAGE_TAG"
